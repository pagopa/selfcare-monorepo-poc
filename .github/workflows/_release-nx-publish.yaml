name: Nx Release

on:
  push:
    branches:
      - main
    paths:
      - ".nx/version-plans/**"
  pull_request:
    types:
      - closed
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'nx-release/')
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    uses: pagopa/dx/.github/workflows/release-v1.yaml@feat-add-nx-release-support-test
    with:
      environment: infra-dev-ci
      mode: 'publish'
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  pr:
    if: github.event.pull_request.merged != true && github.event_name == 'push'
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    uses: pagopa/dx/.github/workflows/release-v1.yaml@feat-add-nx-release-support-test
    with:
      environment: infra-dev-ci
      mode: 'create-pr'
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
