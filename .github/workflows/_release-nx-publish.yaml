name: Nx Release

on:
  push:
    branches:
      - main
    paths:
      - ".nx/version-plans/**"
  pull_request:
    types:
      - closed
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    uses: pagopa/dx/.github/workflows/release-v1.yaml@feat-add-nx-release-support-test
    with:
      environment: npm-prod-cd
      mode: ${{ github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'nx-release/') && 'publish' || 'create-pr' }}
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
