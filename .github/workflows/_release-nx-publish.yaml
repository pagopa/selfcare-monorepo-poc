name: Nx Release

on:
  push:
    branches:
      - main
    paths:
      - ".nx/version-plans/**"
  pull_request:
    types:
      - closed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Nx Release
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    uses: pagopa/dx/.github/workflows/release-v2.yaml@feat-enhance-nx-release-action
    with:
      environment: infra-dev-ci
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
