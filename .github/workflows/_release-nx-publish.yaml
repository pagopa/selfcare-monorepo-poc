name: Nx Release

on:
  push:
    branches:
      - main
    paths:
      - ".nx/version-plans/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Nx Release
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    uses: pagopa/dx/.github/workflows/release-v2.yaml@feat-add-nx-release-support-test
    with:
      environment: infra-dev-ci
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  docker-latest:
    name: Update Docker latest tags
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Docker Registry URL
        id: registry
        shell: bash
        run: |
          REGISTRY_URL=$(sed -nE 's/^[[:space:]]*"registryUrl"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/p' nx.json | head -n1)
          if [ -z "$REGISTRY_URL" ]; then
            REGISTRY_URL="ghcr.io"
          fi
          echo "registry_url=$REGISTRY_URL" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: steps.registry.outputs.registry_url == 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and Push latest
        shell: bash
        env:
          REGISTRY_URL: ${{ steps.registry.outputs.registry_url }}
        run: |
          set -euo pipefail

          if [ "$REGISTRY_URL" != "ghcr.io" ]; then
            echo "Skipping latest tagging: unsupported registry '$REGISTRY_URL' in this workflow."
            exit 0
          fi

          git fetch --tags --force

          UPDATED_COUNT=0

          for pkg in apps/*/package.json; do
            [ -f "$pkg" ] || continue

            PROJECT_NAME=$(sed -nE 's/^[[:space:]]*"name"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/p' "$pkg" | head -n1)
            REPOSITORY_NAME=$(sed -nE 's/^[[:space:]]*"repositoryName"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/p' "$pkg" | head -n1)

            if [ -z "$PROJECT_NAME" ] || [ -z "$REPOSITORY_NAME" ]; then
              continue
            fi

            PROJECT_TAG=$(git tag --list "${PROJECT_NAME}@*" --sort=-creatordate | head -n1)
            if [ -z "$PROJECT_TAG" ]; then
              echo "No release tag found for $PROJECT_NAME, skipping"
              continue
            fi

            VERSION="${PROJECT_TAG#${PROJECT_NAME}@}"
            VERSION_IMAGE_REF="$REGISTRY_URL/$REPOSITORY_NAME:$VERSION"
            LATEST_IMAGE_REF="$REGISTRY_URL/$REPOSITORY_NAME:latest"

            echo "Updating latest for $PROJECT_NAME"
            echo "  version: $VERSION_IMAGE_REF"
            echo "  latest:  $LATEST_IMAGE_REF"

            docker pull "$VERSION_IMAGE_REF"
            docker tag "$VERSION_IMAGE_REF" "$LATEST_IMAGE_REF"
            docker push "$LATEST_IMAGE_REF"

            UPDATED_COUNT=$((UPDATED_COUNT + 1))
          done

          if [ "$UPDATED_COUNT" -eq 0 ]; then
            echo "No Docker latest tags were updated"
          else
            echo "Updated $UPDATED_COUNT Docker latest tag(s)"
          fi
