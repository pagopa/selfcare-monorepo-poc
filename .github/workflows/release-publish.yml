name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch: # Remove after testing

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    uses: pagopa/dx/.github/workflows/release-v1.yaml@feat-add-nx-release-support
    with:
      environment: infra-dev-ci
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
